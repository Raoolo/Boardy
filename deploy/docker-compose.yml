# Boardy — local & self-host stack.
#
# This compose file lives in deploy/ — all paths (build context, bind mounts,
# env_file) are RELATIVE TO THIS FILE, so `..` = repo root. Pinning the
# project name with `name: boardy` (top-level) keeps the compose project name
# stable regardless of where compose is invoked from.
#
# Three services with distinct activation modes (profiles are additive):
#
#   docker compose -f deploy/docker-compose.yml up -d
#       → only boardy, on localhost:8765 (dev / single-machine LAN)
#
#   docker compose -f deploy/docker-compose.yml --profile tunnel up -d
#       → boardy + cloudflared (server-side deploy via CF Tunnel; requires
#         CF_TUNNEL_TOKEN in .env)
#
#   docker compose -f deploy/docker-compose.yml --profile telegram up -d
#       → boardy + telegram-bot (mobile client via Telegram; requires
#         TELEGRAM_BOT_TOKEN + TELEGRAM_OWNER_IDS in .env).
#       Combinabile col profilo tunnel: `--profile tunnel --profile telegram`.
#
# Bind-mounting code (app/, etl/, web/) is intentional: typical update loop
# on the server is `git pull && docker compose -f deploy/docker-compose.yml
# restart boardy`, which takes a few seconds vs. a full image rebuild. Image
# rebuilds are needed ONLY when pyproject.toml / uv.lock change.
#
# State persistence:
#   - data/ is bind-mounted into /data so the app sees the same SQLite file
#     you already have in the repo (`data/boardy.db`) and Telegram keeps its
#     `telegram_chats.json` alongside it.
#   - rulebooks/ is bind-mounted from host (PDFs are bulky, easier to manage
#     on the host filesystem than inside a volume).
#   - HF cache is baked in the image (see Dockerfile) — no volume needed.

name: boardy

services:
  boardy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: boardy
    restart: unless-stopped
    env_file: ../.env
    # Override BOARDY_DB so the app writes to the shared /data mount, not the
    # repo-relative default. The app.db module reads this if set, otherwise
    # falls back to ./data/boardy.db (local-dev path).
    environment:
      BOARDY_DB: /data/boardy.db
    volumes:
      # Code: bind-mount for hot-update via `git pull && restart boardy`.
      # Read-only so a container-side bug can't corrupt the host repo.
      - ../app:/app/app:ro
      - ../etl:/app/etl:ro
      - ../web:/app/web:ro
      # State: shared with the host repo `data/` folder.
      - ../data:/data
      - ../rulebooks:/app/rulebooks
    # Local-only port binding. With the tunnel profile, traffic comes via
    # the cloudflared container over the internal network — 8765 stays
    # unreachable from the public internet.
    ports:
      - "0.0.0.0:8765:8765"
    networks:
      - boardy_net

  # CF Tunnel — exposes boardy:8765 over a Cloudflare Tunnel to the named
  # hostname configured in the CF dashboard. The token in CF_TUNNEL_TOKEN
  # carries the tunnel ID + credentials; no separate config file needed
  # since the dashboard owns the ingress rules (Tunnels → Public Hostname
  # → service: http://boardy:8765).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: boardy-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - boardy
    networks:
      - boardy_net

  # Telegram bot — thin client su POST /chat. Stesso Dockerfile/build di
  # boardy: in pratica Docker riusa i layer cache, e il container parte con
  # un command override che lancia il bot invece di uvicorn. BOARDY_BASE_URL
  # punta al service `boardy` sulla rete interna — niente esposizione
  # pubblica della porta 8765 richiesta.
  telegram-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: boardy-telegram
    restart: unless-stopped
    profiles: ["telegram"]
    env_file: ../.env
    environment:
      # Override per il networking interno: il bot trova boardy via DNS docker.
      BOARDY_BASE_URL: http://boardy:8765
      # Stesso path del DB → telegram_chats.json va nella stessa cartella,
      # cosi' il restart del container non perde la mappatura conv_id.
      BOARDY_DB: /data/boardy.db
    volumes:
      - ../bot:/app/bot:ro
      - ../data:/data
    depends_on:
      - boardy
    networks:
      - boardy_net
    command: ["python", "-m", "bot.telegram_bot"]


networks:
  boardy_net:
    driver: bridge
