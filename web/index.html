<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Boardy</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0f1115; --fg: #e6e7eb; --muted: #8a8f99;
    --accent: #5fb878; --accent-dim: #3a7c4f;
    --border: #222831; --field: #181b22; --field-edge: #2a2f3a;
    --row-hover: #1a1e27; --sidebar-bg: #11141a;
    /* User bubble: literally the same green used for buttons across the
       app — accent-dim bg + accent border. This is the "Boardy green"
       seen on /sleeves Send, /library + Nuova chat, active nav links —
       so the user voice is unmistakably tied to the brand color, not
       just "vaguely greenish". */
    --user: var(--accent-dim); --user-edge: var(--accent);
    --bot:  #2d3748; --bot-edge:  #3a4150;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
  }

  /* Top bar — same metrics as /library and /sleeves headers so the three
     pages feel like one app: padding 14×24, h1 20px, nav before spacer,
     active link gets the accent treatment. */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  h1 { font-size: 20px; margin: 0; font-weight: 600; }
  h1 .accent { color: var(--accent); }
  header .spacer { flex: 1; }
  nav { display: flex; gap: 8px; }
  nav a {
    color: var(--muted); text-decoration: none; font-size: 13px;
    border: 1px solid var(--field-edge); padding: 6px 12px; border-radius: 8px;
  }
  nav a:hover { color: var(--accent); border-color: var(--accent); }
  nav a.active { color: var(--accent); border-color: var(--accent); }

  /* BGG attribution — required by XML API ToU for public-facing apps.
     Whisper-quiet: no border, transparent bg, low opacity, small logo. */
  footer.bgg-attr {
    padding: 8px 24px;
    display: flex; justify-content: flex-end; align-items: center;
    background: transparent;
  }
  footer.bgg-attr a { display: inline-flex; opacity: 0.55; transition: opacity 150ms ease; }
  footer.bgg-attr a:hover { opacity: 1; }
  footer.bgg-attr img { height: 16px; width: auto; display: block; }

  /* Guest non ha conversazioni persistite: niente sidebar, niente toggle.
     Il banner guest e' iniettato da auth.js (vedi web/static/auth.js). */
  body.guest-mode .sidebar { display: none; }
  body.guest-mode .sidebar-toggle { display: none; }

  /* Topbar toggle for the sidebar — placed leftmost, hamburger glyph.
     Same hit-area as the nav pills for visual coherence. */
  .sidebar-toggle {
    background: transparent; color: var(--muted);
    border: 1px solid var(--field-edge); border-radius: 8px;
    padding: 6px 10px; font-size: 16px; line-height: 1;
    cursor: pointer; font-family: inherit;
    transition: color 150ms ease, border-color 150ms ease;
  }
  .sidebar-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* Layout: sidebar (chat list) + main pane (messages + composer).
     The sidebar collapses to width 0 when `.layout.sidebar-collapsed` is set;
     the chat pane (flex:1) reclaims the space. Transition both width and
     min-width so the chat-pane reflow is smooth. */
  .layout {
    flex: 1; display: flex; min-height: 0; overflow: hidden;
  }
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: width 220ms ease, min-width 220ms ease, border-right-width 220ms ease;
  }
  .layout.sidebar-collapsed .sidebar {
    width: 0; min-width: 0; border-right-width: 0;
  }
  .sidebar-header {
    padding: 10px;
    border-bottom: 1px solid var(--border);
  }
  .new-chat-btn {
    width: 100%;
    background: var(--accent-dim); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 8px;
    padding: 9px 12px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 150ms ease;
    white-space: nowrap; overflow: hidden;
  }
  .new-chat-btn:hover { background: var(--accent); color: #0f1115; }
  .new-chat-btn .icon { font-size: 16px; line-height: 1; }
  .conv-list {
    flex: 1; overflow-y: auto;
    list-style: none; margin: 0; padding: 6px;
  }
  .conv-empty {
    color: var(--muted); font-size: 12px; padding: 14px 10px;
    text-align: center; font-style: italic;
  }
  /* Each conv row: title + a × delete that's invisible until hover. The
     active row gets an accent left-border and tinted bg so it's obvious
     which conv you're reading without screaming. */
  .conv-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer; user-select: none;
    border-left: 2px solid transparent;
    transition: background 120ms ease, border-color 120ms ease;
  }
  .conv-item:hover { background: var(--row-hover); }
  .conv-item.active {
    background: rgba(95, 184, 120, 0.10);
    border-left-color: var(--accent);
  }
  .conv-title {
    flex: 1; font-size: 13px; color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .conv-item.active .conv-title { color: var(--fg); }
  .conv-item:not(.active) .conv-title { color: #c4c8d0; }
  .conv-del {
    background: transparent; border: 0; cursor: pointer;
    color: var(--muted); font-size: 16px; line-height: 1;
    padding: 2px 6px; border-radius: 6px;
    opacity: 0; transition: opacity 120ms ease, color 120ms ease, background 120ms ease;
    font-family: inherit;
  }
  .conv-item:hover .conv-del,
  .conv-item.active .conv-del { opacity: 1; }
  .conv-del:hover { color: #f87171; background: rgba(248, 113, 113, 0.12); }

  /* Main chat pane — content centered with max-width so the conversation
     stays readable on wide screens, but the pane background extends to the
     right edge for a clean full-bleed look. */
  .chat-pane {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 22px 20px;
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; max-width: 760px; margin: 0 auto;
  }
  .composer-wrap {
    border-top: 1px solid var(--border);
    padding: 12px 20px 18px;
  }
  form {
    width: 100%; max-width: 760px; margin: 0 auto;
    display: flex; gap: 8px;
  }

  /* Bubbles. */
  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 14px;
    line-height: 1.5; word-wrap: break-word;
    /* Subtle 200ms entrance — bubbles slide up while fading. Runs once on
       insertion; on rerender history all bubbles animate together as a
       coherent "loading in" effect. */
    animation: bubble-in 200ms ease-out;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .user {
    align-self: flex-end; background: var(--user);
    border: 1px solid var(--user-edge);
    white-space: pre-wrap;
  }
  .bot {
    align-self: flex-start; background: var(--bot);
    border: 1px solid var(--bot-edge);
  }
  .bot p:first-child { margin-top: 0; }
  .bot p:last-child  { margin-bottom: 0; }
  .bot p { margin: 6px 0; }
  .bot ul, .bot ol { margin: 6px 0; padding-left: 20px; }
  .bot li { margin: 2px 0; }
  .bot strong { color: #fff; }
  .bot table {
    border-collapse: collapse; margin: 8px 0;
    font-size: 13px; width: 100%;
  }
  .bot th, .bot td {
    border: 1px solid #3a4150; padding: 4px 8px; text-align: left;
  }
  .bot th { background: #1f2530; }
  .bot code {
    background: #1f2530; padding: 1px 5px; border-radius: 4px;
    font-size: 12.5px;
  }
  .bot hr { border: 0; border-top: 1px solid #3a4150; margin: 8px 0; }

  /* Empty-state splash — shown when history is empty (new chat). */
  .splash {
    margin: auto 0; padding: 32px 16px;
    display: flex; flex-direction: column; align-items: center;
    gap: 18px; text-align: center;
    animation: bubble-in 280ms ease-out;
  }
  .splash h2 {
    margin: 0; font-size: 22px; font-weight: 600;
    color: var(--fg); letter-spacing: -0.01em;
  }
  .splash p {
    margin: 0; color: var(--muted); font-size: 14px;
    max-width: 460px; line-height: 1.5;
  }
  .splash-chips {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px; width: 100%; max-width: 560px; margin-top: 6px;
  }
  /* Chips reuse the user-bubble palette (accent-dim + accent border) so
     they read as "things I'm about to say" — same visual register as the
     user's own messages. Hover brightens to full accent for affordance. */
  .splash-chip {
    padding: 12px 14px; border-radius: 12px;
    background: var(--user); border: 1px solid var(--user-edge);
    color: var(--fg); font-family: inherit; font-size: 13.5px;
    text-align: left; cursor: pointer;
    transition: background 180ms ease, transform 120ms ease, box-shadow 180ms ease;
  }
  .splash-chip:hover {
    background: var(--accent); color: #0f1115;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(95, 184, 120, 0.25);
  }
  .splash-chip:active { transform: translateY(0); }
  @media (max-width: 540px) {
    .splash-chips { grid-template-columns: 1fr; }
  }

  /* Typing indicator — three dots that pulse in sequence. */
  .typing {
    display: inline-flex; gap: 5px; align-items: center;
    padding: 12px 14px;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    animation: typing-pulse 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes typing-pulse {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30%           { opacity: 1;   transform: translateY(-3px); }
  }

  /* Composer input. */
  input[type=text] {
    flex: 1; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--field-edge); background: var(--field); color: var(--fg);
    font-size: 14px; font-family: inherit;
    transition: border-color 180ms ease, box-shadow 220ms ease;
  }
  input[type=text]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(95, 184, 120, 0.18);
  }
  button.send {
    padding: 0 18px; border-radius: 10px; border: 0;
    background: var(--accent); color: #0f1115; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  button.send:disabled { opacity: 0.5; cursor: progress; }

  /* Drop zone overlay. */
  #dropOverlay {
    position: fixed; inset: 0; background: rgba(15,17,21,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 100; pointer-events: none;
    border: 3px dashed var(--accent);
  }
  #dropOverlay.active { display: flex; }
  #dropOverlay .label {
    font-size: 24px; color: var(--accent); font-weight: 600;
  }

  /* Upload modal. */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--field); border: 1px solid var(--field-edge);
    border-radius: 12px; padding: 20px 22px; min-width: 320px; max-width: 90vw;
    color: var(--fg); display: flex; flex-direction: column; gap: 12px;
  }
  .modal h2 { margin: 0; font-size: 16px; font-weight: 600; }
  .modal .row { display: flex; gap: 8px; align-items: center; }
  .modal input[type=text] {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--field-edge); background: var(--bg); color: var(--fg);
    font-family: inherit; font-size: 14px;
  }
  .modal .filename { color: var(--muted); font-size: 13px; word-break: break-all; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { font-family: inherit; font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; }
  .modal .btn-primary { background: var(--accent); color: var(--bg); border: 0; font-weight: 600; }
  .modal .btn-secondary { background: transparent; color: var(--fg); border: 1px solid var(--field-edge); }
  /* Destructive confirm action — soft red, hover slightly more saturated.
     Keeps the modal's calm look while still reading as "this deletes". */
  .modal .btn-danger {
    background: #b94747; color: #fff; border: 0; font-weight: 600;
  }
  .modal .btn-danger:hover { background: #d05656; }
  .modal .progress { font-size: 13px; color: var(--muted); }
  .modal .text { font-size: 13.5px; color: var(--muted); line-height: 1.5; }

  /* Backdrop behind the mobile slide-over sidebar. Inert on desktop. */
  .sidebar-backdrop { display: none; }

  /* ─── Mobile (≤640px): sidebar becomes a slide-over overlay ──────────
     On phones the fixed 260px sidebar ate most of the screen. Here it
     floats ABOVE the chat (position:absolute) with a dimmed, tap-to-close
     backdrop instead of squeezing the conversation; collapsed = slid
     off-screen so the chat pane always gets the full width. We also widen
     the bubbles, trim padding, shrink the header, and bump the composer
     input to 16px so iOS Safari doesn't auto-zoom on focus. */
  @media (max-width: 640px) {
    /* Header on two rows: logo + auth badge up top, the section nav on its
       own full-width line below (via flex order) — no more cramming the
       brand and all four section pills onto a single line. */
    header { padding: 10px 14px; gap: 8px 12px; }
    h1 { font-size: 17px; }
    nav { order: 10; flex-basis: 100%; gap: 6px; }
    nav a { font-size: 12px; padding: 5px 9px; }
    header .spacer { order: 5; }
    .auth-badge { order: 6; }

    .layout { position: relative; }
    .sidebar {
      position: absolute; top: 0; left: 0; bottom: 0; z-index: 50;
      width: 80%; max-width: 300px; min-width: 0;
      border-right: 1px solid var(--border);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.45);
      transform: translateX(0);
      transition: transform 220ms ease;
    }
    /* Collapsed on mobile = slide off-screen (not width:0). */
    .layout.sidebar-collapsed .sidebar {
      width: 80%; max-width: 300px; min-width: 0; border-right-width: 1px;
      transform: translateX(-105%);
    }
    .sidebar-backdrop {
      display: block; position: absolute; inset: 0; z-index: 40;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 220ms ease;
    }
    .layout:not(.sidebar-collapsed) .sidebar-backdrop {
      opacity: 1; pointer-events: auto;
    }
    body.guest-mode .sidebar-backdrop { display: none; }

    #chat { padding: 16px 12px; }
    .composer-wrap { padding: 10px 12px 14px; }
    .msg { max-width: 92%; }
    input[type=text] { font-size: 16px; }
    .splash { padding: 24px 12px; }
    .splash h2 { font-size: 19px; }
  }
</style>
</head>
<body>
<header>
  <button class="sidebar-toggle" id="sidebarToggle" title="Mostra/nascondi chat (Ctrl+B)" aria-label="Toggle sidebar">☰</button>
  <h1>Bo<span class="accent">ardy</span> · Chat</h1>
  <nav>
    <a href="/" class="active">Chat</a>
    <a href="/library">Libreria</a>
    <a href="/sleeves">Buste</a>
    <a href="/wishlist">Wishlist</a>
  </nav>
  <span class="spacer"></span>
</header>
<!-- Banner guest e badge auth sono iniettati da web/static/auth.js. -->
<script src="/static/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<div id="dropOverlay"><div class="label">📕 Trascina qui il PDF del regolamento</div></div>
<!-- Custom confirm dialog (replaces native confirm() for chat deletion).
     Generic enough to reuse for other destructive ops if needed — the JS
     `confirmDialog()` helper sets the title/message/button label per call. -->
<div class="modal-back" id="confirmBack">
  <div class="modal">
    <h2 id="confirmTitle">Conferma</h2>
    <p class="text" id="confirmMsg"></p>
    <div class="actions">
      <button class="btn-secondary" id="confirmCancel">Annulla</button>
      <button class="btn-danger"    id="confirmOk">Elimina</button>
    </div>
  </div>
</div>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <h2>Indicizza regolamento</h2>
    <div class="filename" id="modalFilename"></div>
    <div class="row">
      <input type="text" id="modalGame" list="gameNames" placeholder="Nome del gioco" autocomplete="off" />
      <datalist id="gameNames"></datalist>
    </div>
    <div class="progress" id="modalProgress"></div>
    <div class="actions">
      <button class="btn-secondary" id="modalCancel">Annulla</button>
      <button class="btn-primary"   id="modalConfirm">Indicizza</button>
    </div>
  </div>
</div>

<div class="layout" id="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newBtn" title="Nuova chat">
        <span class="icon">+</span><span class="label">Nuova chat</span>
      </button>
    </div>
    <ul class="conv-list" id="convList"></ul>
  </aside>
  <!-- Dimmed backdrop for the mobile slide-over sidebar; tap to close. -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <section class="chat-pane">
    <div id="chat"></div>
    <div class="composer-wrap">
      <form id="f">
        <input id="m" type="text" autocomplete="off"
               placeholder="Quante bustine 63,5×88 devo comprare?" autofocus />
        <button class="send" id="b" type="submit">Invia</button>
      </form>
    </div>
  </section>
</div>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('f');
  const input = document.getElementById('m');
  const btn = document.getElementById('b');
  const convList = document.getElementById('convList');
  const newBtn = document.getElementById('newBtn');
  const layout = document.getElementById('layout');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');

  // On phones the sidebar is a slide-over overlay (see the ≤640px media
  // query): hidden by default, opened over the chat, closed by tapping the
  // backdrop or picking a conversation.
  const isMobile = () => window.matchMedia('(max-width: 640px)').matches;

  // Sidebar collapse state. On desktop it persists across reloads (default
  // visible). On mobile we always start collapsed regardless of the desktop
  // preference — otherwise the overlay would cover the chat on every load.
  function applySidebarState(collapsed) {
    layout.classList.toggle('sidebar-collapsed', collapsed);
    sidebarToggle.setAttribute('aria-expanded', String(!collapsed));
  }
  applySidebarState(isMobile() ? true
                              : localStorage.getItem('boardy_sidebar_collapsed') === '1');
  sidebarToggle.addEventListener('click', () => {
    const collapsed = !layout.classList.contains('sidebar-collapsed');
    applySidebarState(collapsed);
    // Don't let a transient mobile toggle overwrite the desktop preference.
    if (!isMobile()) localStorage.setItem('boardy_sidebar_collapsed', collapsed ? '1' : '0');
  });
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'b') {
      e.preventDefault();
      sidebarToggle.click();
    }
  });

  // Close the mobile overlay after tapping the backdrop, picking a chat, or
  // starting a new one — so the conversation is immediately visible.
  function closeSidebarOnMobile() {
    if (isMobile() && !layout.classList.contains('sidebar-collapsed')) {
      applySidebarState(true);
    }
  }
  sidebarBackdrop.addEventListener('click', closeSidebarOnMobile);
  convList.addEventListener('click', (e) => {
    if (e.target.closest('.conv-del')) return;   // deleting: keep it open
    if (e.target.closest('.conv-item')) closeSidebarOnMobile();
  });
  newBtn.addEventListener('click', closeSidebarOnMobile);

  // Auth gate: settato dopo /auth/me. Guest = chat ephemera in sessionStorage,
  // niente sidebar, niente /conversations. Owner = comportamento legacy.
  let isGuest = true;
  let convId = parseInt(localStorage.getItem('boardy_conv_id') || '0') || null;
  let history = [];
  // Cache of the latest list so we can re-render the sidebar without
  // re-fetching when active state changes.
  let convsCache = [];

  marked.setOptions({ breaks: true, gfm: true });

  function setConvId(id) {
    convId = id;
    // Guest non ha conv_id persistito: bypass localStorage e sidebar render.
    if (isGuest) return;
    if (id) localStorage.setItem('boardy_conv_id', String(id));
    else    localStorage.removeItem('boardy_conv_id');
    renderConvList();
  }

  // Suggested prompts shown when the chat is empty. Picked to cover the
  // four main capability areas (sleeves / structural filter / semantic /
  // audit) so new visitors immediately see what Boardy can do.
  const SPLASH_PROMPTS = [
    'Quante buste mi mancano?',
    'Giochi da 2 facili e veloci',
    'Consigliami qualcosa di rilassante',
    "Cosa è cambiato di recente?",
  ];

  function renderSplash() {
    const wrap = document.createElement('div');
    wrap.className = 'splash';
    wrap.innerHTML = `
      <h2>Cosa vuoi sapere oggi?</h2>
      <p>Chiedimi della tua collezione, delle bustine, dei rulebook,
         o di cosa hai aggiunto di recente. Oppure parti da un esempio:</p>
      <div class="splash-chips"></div>
    `;
    const chipsHost = wrap.querySelector('.splash-chips');
    for (const text of SPLASH_PROMPTS) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'splash-chip';
      btn.textContent = text;
      btn.addEventListener('click', () => {
        // Populate + auto-submit. We dispatch a synthetic 'submit' event
        // so the existing form handler runs — keeps the chip path
        // identical to a hand-typed message (typing indicator, history
        // update, conv-id assignment all flow through the same code).
        input.value = text;
        form.dispatchEvent(new Event('submit', { cancelable: true }));
      });
      chipsHost.appendChild(btn);
    }
    chat.appendChild(wrap);
  }

  function rerender() {
    chat.innerHTML = '';
    if (!history || history.length === 0) {
      renderSplash();
      return;
    }
    // History format depends on which provider wrote it (Anthropic stores
    // assistant.content as a block array; OpenAI/DeepSeek as a string with
    // tool_calls separate). A single conv may even mix shapes if the
    // provider was switched mid-thread, so we accept either per-turn.
    for (const turn of history) {
      if (turn.role === 'user' && typeof turn.content === 'string') {
        // Anthropic packs tool_results as role=user with array content;
        // the typeof check above filters those out.
        addBubble(turn.content, 'user');
      } else if (turn.role === 'assistant') {
        let text = '';
        if (Array.isArray(turn.content)) {
          text = turn.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
        } else if (typeof turn.content === 'string') {
          text = turn.content.trim();
        }
        if (text) addBubble(text, 'bot');
      }
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function addBubble(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    if (who === 'bot') div.innerHTML = marked.parse(text);
    else               div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // Sidebar: build one row per conversation. Click on the row → switch.
  // Click on the × → confirm + delete + switch to next (or empty state).
  // Re-rendered from convsCache whenever active state or list changes —
  // cheap because the list is short (single-user app).
  function renderConvList() {
    convList.innerHTML = '';
    if (convsCache.length === 0) {
      const li = document.createElement('li');
      li.className = 'conv-empty';
      li.textContent = 'Nessuna chat ancora — scrivi qualcosa!';
      convList.appendChild(li);
      return;
    }
    for (const c of convsCache) {
      const li = document.createElement('li');
      li.className = 'conv-item' + (c.id === convId ? ' active' : '');
      li.dataset.id = String(c.id);

      const title = document.createElement('span');
      title.className = 'conv-title';
      title.textContent = c.title || `Chat #${c.id}`;
      li.appendChild(title);

      const del = document.createElement('button');
      del.className = 'conv-del';
      del.title = 'Elimina questa chat';
      del.textContent = '×';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteConv(c.id);
      });
      li.appendChild(del);

      li.addEventListener('click', () => {
        if (c.id !== convId) loadConv(c.id);
      });
      convList.appendChild(li);
    }
  }

  async function loadList() {
    // Guest: la sidebar e' nascosta, nessun motivo di chiamare /conversations
    // (sarebbe 401 comunque — protetto dal backend).
    if (isGuest) { convsCache = []; return convsCache; }
    const res = await fetch('/conversations');
    if (!res.ok) { convsCache = []; return convsCache; }
    convsCache = await res.json();
    renderConvList();
    return convsCache;
  }

  async function loadConv(id) {
    if (!id) { history = []; rerender(); return; }
    const res = await fetch('/conversations/' + id);
    if (!res.ok) { history = []; setConvId(null); rerender(); return; }
    const data = await res.json();
    history = data.history || [];
    setConvId(id);
    rerender();
  }

  // Promise-based replacement for native confirm(). Resolves true on OK,
  // false on cancel / backdrop click / Escape. Re-uses the modal pattern
  // already in place for the rulebook upload, so styles stay consistent.
  function confirmDialog({ title = 'Conferma', message = '', okLabel = 'Conferma' } = {}) {
    return new Promise((resolve) => {
      const back   = document.getElementById('confirmBack');
      const titleE = document.getElementById('confirmTitle');
      const msgE   = document.getElementById('confirmMsg');
      const ok     = document.getElementById('confirmOk');
      const cancel = document.getElementById('confirmCancel');
      titleE.textContent = title;
      msgE.textContent   = message;
      ok.textContent     = okLabel;
      back.classList.add('open');
      ok.focus();

      function cleanup(result) {
        back.classList.remove('open');
        ok.removeEventListener('click', onOk);
        cancel.removeEventListener('click', onCancel);
        back.removeEventListener('click', onBackdrop);
        document.removeEventListener('keydown', onKey);
        resolve(result);
      }
      function onOk()       { cleanup(true);  }
      function onCancel()   { cleanup(false); }
      function onBackdrop(e){ if (e.target === back) cleanup(false); }
      function onKey(e) {
        if (e.key === 'Escape') cleanup(false);
        else if (e.key === 'Enter') cleanup(true);
      }
      ok.addEventListener('click', onOk);
      cancel.addEventListener('click', onCancel);
      back.addEventListener('click', onBackdrop);
      document.addEventListener('keydown', onKey);
    });
  }

  async function deleteConv(id) {
    const conv = convsCache.find(c => c.id === id);
    const title = conv?.title || `Chat #${id}`;
    const ok = await confirmDialog({
      title: 'Cancellare la conversazione?',
      message: `"${title}" verrà eliminata definitivamente. Vuoi procedere?`,
      okLabel: 'Elimina',
    });
    if (!ok) return;
    await fetch('/conversations/' + id, { method: 'DELETE' });
    // Remove from cache locally so we don't have to refetch.
    convsCache = convsCache.filter(c => c.id !== id);
    if (id === convId) {
      // Switch to next available conv, or empty state.
      if (convsCache.length) {
        await loadConv(convsCache[0].id);
      } else {
        history = [];
        setConvId(null);
        rerender();
      }
    } else {
      renderConvList();
    }
  }

  newBtn.addEventListener('click', () => {
    history = [];
    setConvId(null);
    rerender();
    input.focus();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    input.value = '';
    btn.disabled = true;
    addBubble(message, 'user');
    // Typing indicator: empty bubble with three pulsing dots driven by CSS.
    // Build the DOM directly so the spans aren't fed through marked.parse.
    const typing = document.createElement('div');
    typing.className = 'msg bot typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;
    try {
      // Guest: invia l'intero history (vive in sessionStorage del browser).
      // Owner: invia solo conversation_id, il server carica history dal DB.
      const payload = isGuest
        ? { message, history }
        : { message, conversation_id: convId };
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      typing.remove();
      addBubble(data.reply || '(nessuna risposta)', 'bot');
      history = data.history;
      if (isGuest) {
        // Persisti il nuovo history in sessionStorage (sparisce al refresh tab).
        try { sessionStorage.setItem('boardy_guest_history', JSON.stringify(history)); } catch (_) {}
      } else {
        const wasNew = !convId;
        setConvId(data.conversation_id);
        if (wasNew) await loadList();
      }
    } catch (err) {
      typing.classList.remove('typing');
      typing.textContent = 'Errore: ' + err.message;
    } finally {
      btn.disabled = false;
      input.focus();
    }
  });

  (async () => {
    // Auth gate prima di qualsiasi fetch: decide modalita' guest vs owner.
    const authState = await BoardyAuth.state();
    isGuest = !authState.authenticated;
    BoardyAuth.mountBadge(document.querySelector('header'));
    if (isGuest) {
      document.body.classList.add('guest-mode');
      // Riprendi history da sessionStorage se l'utente refresha mid-chat
      // (sessionStorage sopravvive al refresh ma muore alla chiusura del tab).
      try {
        const saved = sessionStorage.getItem('boardy_guest_history');
        if (saved) history = JSON.parse(saved) || [];
      } catch (_) { history = []; }
      convId = null;
      rerender();
      return;
    }
    // Owner: comportamento storico — carica lista chat, riprendi l'ultima se id valido.
    await loadList();
    if (convId && convsCache.some(c => c.id === convId)) {
      await loadConv(convId);
    } else {
      setConvId(null);
      history = [];
      rerender();
    }
  })();

  // ---- Drag-and-drop PDF upload ----
  const dropOverlay  = document.getElementById('dropOverlay');
  const modalBack    = document.getElementById('modalBack');
  const modalFile    = document.getElementById('modalFilename');
  const modalGame    = document.getElementById('modalGame');
  const modalConfirm = document.getElementById('modalConfirm');
  const modalCancel  = document.getElementById('modalCancel');
  const modalProgress = document.getElementById('modalProgress');
  const gameNames    = document.getElementById('gameNames');
  let pendingFile = null;
  let dragCounter = 0;

  async function refreshGameNames() {
    const res = await fetch('/games/names');
    const names = await res.json();
    gameNames.innerHTML = names.map(n => `<option value="${n.replace(/"/g, '&quot;')}">`).join('');
  }
  refreshGameNames();

  ['dragenter', 'dragover'].forEach(ev =>
    document.addEventListener(ev, (e) => {
      if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
      e.preventDefault();
      if (ev === 'dragenter') dragCounter++;
      dropOverlay.classList.add('active');
    })
  );
  document.addEventListener('dragleave', (e) => {
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) dropOverlay.classList.remove('active');
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');
    const f = e.dataTransfer?.files?.[0];
    if (!f) return;
    if (!f.name.toLowerCase().endsWith('.pdf')) {
      alert('Solo PDF supportati per ora.');
      return;
    }
    pendingFile = f;
    modalFile.textContent = `File: ${f.name} (${(f.size / 1024).toFixed(0)} KB)`;
    modalGame.value = '';
    modalProgress.textContent = '';
    modalConfirm.disabled = false;
    modalBack.classList.add('open');
    modalGame.focus();
  });

  function closeModal() {
    modalBack.classList.remove('open');
    pendingFile = null;
  }
  modalCancel.addEventListener('click', closeModal);
  modalBack.addEventListener('click', (e) => { if (e.target === modalBack) closeModal(); });

  modalConfirm.addEventListener('click', async () => {
    const game = modalGame.value.trim();
    if (!game || !pendingFile) return;
    modalConfirm.disabled = true;
    modalProgress.textContent = 'Caricamento + indicizzazione (può richiedere 10–30s)…';
    const fd = new FormData();
    fd.append('game_name', game);
    fd.append('file', pendingFile);
    try {
      const res = await fetch('/rulebooks/upload', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      closeModal();
      addBubble(`📕 **${data.game}** indicizzato — ${data.pages} pagine, ${data.chunks} chunk. Ora puoi farmi domande sulle regole.`, 'bot');
    } catch (err) {
      modalProgress.textContent = 'Errore: ' + err.message;
      modalConfirm.disabled = false;
    }
  });
</script>
