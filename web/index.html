<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Boardy</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0f1115; --fg: #e6e7eb; --muted: #8a8f99;
    --user: #2b6cb0; --bot: #2d3748; --accent: #5fb878;
    --border: #222831; --field: #181b22; --field-edge: #2a2f3a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; max-width: 720px; padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 600; flex: 0 0 auto; }
  h1 .accent { color: var(--accent); }
  select, .iconbtn {
    background: var(--field); color: var(--fg);
    border: 1px solid var(--field-edge); border-radius: 8px;
    padding: 6px 10px; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  select { flex: 1; min-width: 120px; max-width: 320px; }
  .iconbtn:hover, select:hover { border-color: var(--accent); }
  .iconbtn:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  #chat {
    flex: 1; width: 100%; max-width: 720px;
    overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 14px;
    line-height: 1.5; word-wrap: break-word;
  }
  .user { align-self: flex-end; background: var(--user); white-space: pre-wrap; }
  .bot  { align-self: flex-start; background: var(--bot); }
  .bot p:first-child { margin-top: 0; }
  .bot p:last-child  { margin-bottom: 0; }
  .bot p { margin: 6px 0; }
  .bot ul, .bot ol { margin: 6px 0; padding-left: 20px; }
  .bot li { margin: 2px 0; }
  .bot strong { color: #fff; }
  .bot table {
    border-collapse: collapse; margin: 8px 0;
    font-size: 13px; width: 100%;
  }
  .bot th, .bot td {
    border: 1px solid #3a4150; padding: 4px 8px; text-align: left;
  }
  .bot th { background: #1f2530; }
  .bot code {
    background: #1f2530; padding: 1px 5px; border-radius: 4px;
    font-size: 12.5px;
  }
  .bot hr { border: 0; border-top: 1px solid #3a4150; margin: 8px 0; }
  .typing { color: var(--muted); font-style: italic; }
  form {
    width: 100%; max-width: 720px; padding: 12px 20px 20px;
    display: flex; gap: 8px; border-top: 1px solid var(--border);
  }
  input[type=text] {
    flex: 1; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--field-edge); background: var(--field); color: var(--fg);
    font-size: 14px; font-family: inherit;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button.send {
    padding: 0 18px; border-radius: 10px; border: 0;
    background: var(--accent); color: #0f1115; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  button.send:disabled { opacity: 0.5; cursor: progress; }

  /* Drop zone overlay */
  #dropOverlay {
    position: fixed; inset: 0; background: rgba(15,17,21,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 100; pointer-events: none;
    border: 3px dashed var(--accent);
  }
  #dropOverlay.active { display: flex; }
  #dropOverlay .label {
    font-size: 24px; color: var(--accent); font-weight: 600;
  }

  /* Upload modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--field); border: 1px solid var(--field-edge);
    border-radius: 12px; padding: 20px 22px; min-width: 320px; max-width: 90vw;
    color: var(--fg); display: flex; flex-direction: column; gap: 12px;
  }
  .modal h2 { margin: 0; font-size: 16px; font-weight: 600; }
  .modal .row { display: flex; gap: 8px; align-items: center; }
  .modal input[type=text] {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--field-edge); background: var(--bg); color: var(--fg);
    font-family: inherit; font-size: 14px;
  }
  .modal .filename { color: var(--muted); font-size: 13px; word-break: break-all; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { font-family: inherit; font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; }
  .modal .btn-primary { background: var(--accent); color: var(--bg); border: 0; font-weight: 600; }
  .modal .btn-secondary { background: transparent; color: var(--fg); border: 1px solid var(--field-edge); }
  .modal .progress { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Bo<span class="accent">ardy</span></h1>
  <select id="convs" title="Switch conversation"></select>
  <button class="iconbtn" id="newBtn" title="New chat">+</button>
  <button class="iconbtn" id="delBtn" title="Delete current chat">🗑</button>
  <a class="iconbtn" href="/library" title="Sfoglia la libreria" style="text-decoration:none;color:inherit">📚</a>
</header>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<div id="dropOverlay"><div class="label">📕 Trascina qui il PDF del regolamento</div></div>
<div class="modal-back" id="modalBack">
  <div class="modal">
    <h2>Indicizza regolamento</h2>
    <div class="filename" id="modalFilename"></div>
    <div class="row">
      <input type="text" id="modalGame" list="gameNames" placeholder="Nome del gioco" autocomplete="off" />
      <datalist id="gameNames"></datalist>
    </div>
    <div class="progress" id="modalProgress"></div>
    <div class="actions">
      <button class="btn-secondary" id="modalCancel">Annulla</button>
      <button class="btn-primary"   id="modalConfirm">Indicizza</button>
    </div>
  </div>
</div>
<div id="chat"></div>
<form id="f">
  <input id="m" type="text" autocomplete="off"
         placeholder="Quante bustine 63,5×88 devo comprare?" autofocus />
  <button class="send" id="b" type="submit">Invia</button>
</form>
<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('f');
  const input = document.getElementById('m');
  const btn = document.getElementById('b');
  const convsSel = document.getElementById('convs');
  const newBtn = document.getElementById('newBtn');
  const delBtn = document.getElementById('delBtn');

  let convId = parseInt(localStorage.getItem('boardy_conv_id') || '0') || null;
  let history = [];

  marked.setOptions({ breaks: true, gfm: true });

  function setConvId(id) {
    convId = id;
    if (id) localStorage.setItem('boardy_conv_id', String(id));
    else    localStorage.removeItem('boardy_conv_id');
  }

  function rerender() {
    chat.innerHTML = '';
    for (const turn of history) {
      if (turn.role === 'user' && typeof turn.content === 'string') {
        addBubble(turn.content, 'user');
      } else if (turn.role === 'assistant' && Array.isArray(turn.content)) {
        const text = turn.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
        if (text) addBubble(text, 'bot');
      }
    }
    chat.scrollTop = chat.scrollHeight;
  }

  function addBubble(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    if (who === 'bot') div.innerHTML = marked.parse(text);
    else               div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function loadList() {
    const res = await fetch('/conversations');
    const list = await res.json();
    convsSel.innerHTML = '';
    if (list.length === 0) {
      const opt = document.createElement('option');
      opt.textContent = '(nuova chat)'; opt.value = '';
      convsSel.appendChild(opt);
      return list;
    }
    for (const c of list) {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.title || `Chat #${c.id}`;
      convsSel.appendChild(opt);
    }
    return list;
  }

  async function loadConv(id) {
    if (!id) { history = []; rerender(); return; }
    const res = await fetch('/conversations/' + id);
    if (!res.ok) { history = []; setConvId(null); rerender(); return; }
    const data = await res.json();
    history = data.history || [];
    setConvId(id);
    convsSel.value = String(id);
    rerender();
  }

  convsSel.addEventListener('change', () => {
    const id = parseInt(convsSel.value);
    if (id) loadConv(id);
  });

  newBtn.addEventListener('click', () => {
    setConvId(null);
    history = [];
    rerender();
    convsSel.value = '';
    input.focus();
  });

  delBtn.addEventListener('click', async () => {
    if (!convId) return;
    if (!confirm('Cancellare questa conversazione?')) return;
    await fetch('/conversations/' + convId, { method: 'DELETE' });
    setConvId(null);
    history = [];
    rerender();
    const list = await loadList();
    if (list.length) loadConv(list[0].id);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    input.value = '';
    btn.disabled = true;
    addBubble(message, 'user');
    const typing = addBubble('…', 'bot');
    typing.classList.add('typing');
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message, conversation_id: convId }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      typing.remove();
      addBubble(data.reply || '(nessuna risposta)', 'bot');
      history = data.history;
      const wasNew = !convId;
      setConvId(data.conversation_id);
      if (wasNew) await loadList();
      convsSel.value = String(data.conversation_id);
    } catch (err) {
      typing.textContent = 'Errore: ' + err.message;
    } finally {
      btn.disabled = false;
      input.focus();
    }
  });

  (async () => {
    const list = await loadList();
    if (convId && list.some(c => c.id === convId)) {
      await loadConv(convId);
    } else if (list.length) {
      await loadConv(list[0].id);
    } else {
      setConvId(null);
    }
  })();

  // ---- Drag-and-drop PDF upload ----
  const dropOverlay  = document.getElementById('dropOverlay');
  const modalBack    = document.getElementById('modalBack');
  const modalFile    = document.getElementById('modalFilename');
  const modalGame    = document.getElementById('modalGame');
  const modalConfirm = document.getElementById('modalConfirm');
  const modalCancel  = document.getElementById('modalCancel');
  const modalProgress = document.getElementById('modalProgress');
  const gameNames    = document.getElementById('gameNames');
  let pendingFile = null;
  let dragCounter = 0;

  // Populate datalist with current games
  async function refreshGameNames() {
    const res = await fetch('/games/names');
    const names = await res.json();
    gameNames.innerHTML = names.map(n => `<option value="${n.replace(/"/g, '&quot;')}">`).join('');
  }
  refreshGameNames();

  ['dragenter', 'dragover'].forEach(ev =>
    document.addEventListener(ev, (e) => {
      if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
      e.preventDefault();
      if (ev === 'dragenter') dragCounter++;
      dropOverlay.classList.add('active');
    })
  );
  document.addEventListener('dragleave', (e) => {
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) dropOverlay.classList.remove('active');
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');
    const f = e.dataTransfer?.files?.[0];
    if (!f) return;
    if (!f.name.toLowerCase().endsWith('.pdf')) {
      alert('Solo PDF supportati per ora.');
      return;
    }
    pendingFile = f;
    modalFile.textContent = `File: ${f.name} (${(f.size / 1024).toFixed(0)} KB)`;
    modalGame.value = '';
    modalProgress.textContent = '';
    modalConfirm.disabled = false;
    modalBack.classList.add('open');
    modalGame.focus();
  });

  function closeModal() {
    modalBack.classList.remove('open');
    pendingFile = null;
  }
  modalCancel.addEventListener('click', closeModal);
  modalBack.addEventListener('click', (e) => { if (e.target === modalBack) closeModal(); });

  modalConfirm.addEventListener('click', async () => {
    const game = modalGame.value.trim();
    if (!game || !pendingFile) return;
    modalConfirm.disabled = true;
    modalProgress.textContent = 'Caricamento + indicizzazione (può richiedere 10–30s)…';
    const fd = new FormData();
    fd.append('game_name', game);
    fd.append('file', pendingFile);
    try {
      const res = await fetch('/rulebooks/upload', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      closeModal();
      addBubble(`📕 **${data.game}** indicizzato — ${data.pages} pagine, ${data.chunks} chunk. Ora puoi farmi domande sulle regole.`, 'bot');
    } catch (err) {
      modalProgress.textContent = 'Errore: ' + err.message;
      modalConfirm.disabled = false;
    }
  });
</script>
</body>
</html>
