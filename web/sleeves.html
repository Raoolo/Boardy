<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>Boardy — Buste</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --fg: #e6e7eb; --muted: #8a8f99;
    --accent: #5fb878; --accent-dim: #3a7c4f; --warn: #f59e0b; --danger: #f87171;
    --border: #222831; --field: #181b22; --field-edge: #2a2f3a;
    --row-hover: #1a1e27; --row-alt: #13161c;
    --pill: #232936; --pill-fg: #b9c0cc;
    --card: #161922;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }

  /* Header / nav */
  header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  h1 { font-size: 20px; margin: 0; font-weight: 600; }
  h1 .accent { color: var(--accent); }
  nav { display: flex; gap: 8px; }
  nav a {
    color: var(--muted); text-decoration: none; font-size: 13px;
    border: 1px solid var(--field-edge); padding: 6px 12px; border-radius: 8px;
  }
  nav a:hover { color: var(--accent); border-color: var(--accent); }
  nav a.active { color: var(--accent); border-color: var(--accent); }
  header .spacer { flex: 1; }

  /* Layout */
  main { padding: 22px 24px 80px; max-width: 1200px; margin: 0 auto; }
  section { margin-bottom: 38px; }
  h2 {
    font-size: 16px; margin: 0 0 14px; font-weight: 600; color: var(--fg);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  h2 .muted-suffix { font-size: 13px; color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 8px; }

  /* KPI cards */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px;
  }
  .kpi .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi .value { font-size: 28px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .kpi .value.warn { color: var(--warn); }
  .kpi .value.ok { color: var(--accent); }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Tables */
  table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 13.5px; background: var(--card); border-radius: 10px; overflow: hidden;
  }
  th, td {
    padding: 10px 14px; text-align: left; vertical-align: middle;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: #11141a; color: var(--muted); font-weight: 600;
    font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  td.num { white-space: nowrap; font-variant-numeric: tabular-nums; }
  /* Numeric/action columns: right-align both header and cells so digits
     line up by place value (units under units) and headers sit above
     their data. Industry-standard data-table convention. */
  th.right, td.right { text-align: right; }
  td .games-trigger {
    color: var(--muted); cursor: pointer; font-size: 12px;
    text-decoration: underline dotted; text-underline-offset: 3px;
  }
  td .games-trigger:hover { color: var(--accent); }
  td .games-list { display: none; margin-top: 8px; font-size: 12px; color: var(--muted); }
  tr.expanded td .games-list { display: block; }
  .badge-tobuy { color: var(--warn); font-weight: 700; }
  .badge-ok { color: var(--accent); }

  /* Inventory inline editor */
  .inv-row .qty-controls {
    display: inline-flex; gap: 6px; align-items: center;
  }
  .inv-row .qty-input {
    width: 72px; background: var(--field); color: var(--fg);
    border: 1px solid var(--field-edge); border-radius: 6px;
    padding: 4px 8px; font-size: 13px; text-align: right; font-variant-numeric: tabular-nums;
  }
  /* Hide native browser spinners — the +/- preset buttons replace them. */
  .inv-row .qty-input::-webkit-outer-spin-button,
  .inv-row .qty-input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .inv-row .qty-input { -moz-appearance: textfield; appearance: textfield; }
  .inv-row .qty-btn {
    background: var(--field); color: var(--fg); border: 1px solid var(--field-edge);
    border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; font-family: inherit;
    min-width: 38px;
  }
  .inv-row .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .inv-row .qty-btn.warn:hover { border-color: var(--danger); color: var(--danger); }
  .inv-row .qty-save {
    background: var(--accent-dim); color: white; border: none; border-radius: 6px;
    padding: 4px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
    margin-left: 6px;
  }
  .inv-row .qty-save:hover { background: var(--accent); }
  .inv-row .qty-save:disabled { opacity: 0.4; cursor: default; }
  .inv-row .changed { color: var(--warn); font-weight: 600; }

  /* Add-new form */
  .add-form {
    display: grid; grid-template-columns: repeat(4, 1fr) auto;
    gap: 10px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .add-form label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .add-form input {
    background: var(--field); color: var(--fg);
    border: 1px solid var(--field-edge); border-radius: 6px;
    padding: 7px 10px; font-size: 13px; font-family: inherit;
  }
  .add-form input:focus { outline: none; border-color: var(--accent); }
  .add-form input[type=number]::-webkit-outer-spin-button,
  .add-form input[type=number]::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .add-form input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .add-form button {
    align-self: end; background: var(--accent-dim); color: white; border: none; border-radius: 6px;
    padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 600;
  }
  .add-form button:hover { background: var(--accent); }

  /* Smart-action dock (silent UX, top of page).
     Mirrors /library's smart-filter pattern: single input row + status line,
     no bubble log. Multi-turn is preserved server-side via conversation_id
     (so "aggiungi 100 buste" → "che dimensione?" → user answers → bot acts).
     The status line surfaces the latest assistant text after each turn. */
  .smart-dock {
    border-bottom: 1px solid var(--border);
    background: #11141a;
    padding: 14px 24px 16px;
  }
  /* Inner wrapper: keeps the bar's background full-bleed but centers the
     interactive content. Default ~820px (comfortable but visibly narrower
     than the page); on focus-within it expands to 1152px — matches `main`'s
     inner width (max-width 1200 minus 24px padding ×2), so the focused dock
     edges line up exactly with the KPI tiles below. Slight overshoot ease
     gives the "bouncy" feel. */
  .smart-dock-inner {
    max-width: 820px;
    margin: 0 auto;
    transition: max-width 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .smart-dock:focus-within .smart-dock-inner { max-width: 1152px; }
  .smart-dock h2 {
    margin: 0 0 10px; font-size: 15px; font-weight: 600;
    text-transform: none; letter-spacing: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .smart-dock h2 .accent { color: var(--accent); }
  .smart-dock .hint { color: var(--muted); font-size: 12px; font-weight: 400; }
  .smart-row { display: flex; gap: 8px; align-items: stretch; }
  .smart-row textarea {
    flex: 1; min-height: 38px; max-height: 120px; resize: none;
    background: var(--field); color: var(--fg);
    border: 1px solid var(--field-edge); border-radius: 8px;
    padding: 9px 12px; font-size: 13px; font-family: inherit;
    line-height: 1.4;
  }
  /* Soft accent glow on focus — pairs with the bouncy width expansion to
     make the "active chat" state visually distinct. Same treatment as
     /library so the dock UX feels consistent across pages. */
  .smart-row textarea {
    transition: border-color 180ms ease, box-shadow 220ms ease;
  }
  .smart-row textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(95, 184, 120, 0.18);
  }
  .smart-row .send {
    background: var(--accent-dim); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 8px;
    padding: 0 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .smart-row .send:hover { background: var(--accent); }
  .smart-row .send:disabled { opacity: 0.5; cursor: default; }
  .smart-row .clear {
    background: transparent; color: var(--muted);
    border: 1px solid var(--field-edge); border-radius: 8px;
    padding: 0 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .smart-row .clear:hover { color: var(--accent); border-color: var(--accent); }
  .smart-status {
    margin-top: 8px; min-height: 18px;
    font-size: 12.5px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
    /* Long assistant replies: clamp to 2 lines so the dock height stays bounded. */
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .smart-status.thinking { color: var(--warn); }
  .smart-status.success  { color: var(--accent); }
  .smart-status.error    { color: var(--danger); }
  .smart-status.thinking::after {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    animation: smart-pulse 1s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes smart-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }

  .empty { color: var(--muted); font-style: italic; padding: 16px; text-align: center; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--card);
    border: 1px solid var(--accent); color: var(--accent);
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>Bo<span class="accent">ardy</span> · Buste</h1>
  <nav>
    <a href="/">Chat</a>
    <a href="/library">Libreria</a>
    <a href="/sleeves" class="active">Buste</a>
  </nav>
  <span class="spacer"></span>
</header>

<section class="smart-dock">
  <div class="smart-dock-inner">
    <h2>💬 <span class="accent">Chat veloce</span> <span class="hint">— prova "aggiungi 100 buste 63.5×88 brand Mayday" o "quante buste mi mancano?"</span></h2>
    <div class="smart-row">
      <textarea id="chat-input" placeholder="Scrivi una richiesta in italiano…" rows="1"></textarea>
      <button class="send" id="chat-send">Invia</button>
      <button class="clear" id="chat-reset" title="Avvia nuova conversazione">Nuova chat</button>
    </div>
    <div class="smart-status" id="chat-status"></div>
  </div>
</section>

<main>
  <!-- KPI cards -->
  <section>
    <div class="kpis" id="kpis"></div>
  </section>

  <!-- Da comprare -->
  <section>
    <h2>🛒 Da comprare <span class="muted-suffix" id="tobuy-meta"></span></h2>
    <div id="tobuy-wrap"></div>
  </section>

  <!-- Inventario -->
  <section>
    <h2>📦 Inventario <span class="muted-suffix" id="inv-meta"></span></h2>
    <div id="inv-wrap"></div>
  </section>

  <!-- Aggiungi misura -->
  <section>
    <h2>➕ Aggiungi misura</h2>
    <form class="add-form" id="add-form">
      <label>Larghezza (mm)
        <input type="number" id="add-w" step="0.5" min="10" max="200" required placeholder="63.5" />
      </label>
      <label>Altezza (mm)
        <input type="number" id="add-h" step="0.5" min="10" max="200" required placeholder="88" />
      </label>
      <label>Quantità
        <input type="number" id="add-c" step="1" min="0" required placeholder="100" />
      </label>
      <label>Brand (opzionale)
        <input type="text" id="add-b" placeholder="Mayday, Sapphire, …" />
      </label>
      <button type="submit">Aggiungi</button>
    </form>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
const STATE = { data: null, dirtyRows: new Set() };

// ---------- helpers ----------
function fmt(n) { return n == null ? "—" : n.toLocaleString("it-IT"); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.toggle("error", !!isError);
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ---------- load + render ----------
async function load() {
  const r = await fetch("/sleeves/data");
  STATE.data = await r.json();
  renderKpis();
  renderToBuy();
  renderInventory();
}

function renderKpis() {
  const k = STATE.data.kpis;
  const html = [
    {label:"Totale in magazzino", value:fmt(k.total_owned), klass:"ok", sub:"buste possedute"},
    {label:"Da comprare", value:fmt(k.total_to_buy), klass: k.total_to_buy > 0 ? "warn" : "ok",
     sub: k.total_to_buy > 0 ? "buste mancanti" : "tutto a posto ✓"},
    {label:"Misure coperte", value:`${k.sizes_covered} / ${k.sizes_total}`, klass:"",
     sub: "misure senza fabbisogno aperto"},
  ].map(c => `
    <div class="kpi">
      <div class="label">${c.label}</div>
      <div class="value ${c.klass}">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join("");
  document.getElementById("kpis").innerHTML = html;
}

function renderToBuy() {
  const rows = STATE.data.to_buy;
  const meta = document.getElementById("tobuy-meta");
  const wrap = document.getElementById("tobuy-wrap");
  if (!rows.length) {
    meta.textContent = "";
    wrap.innerHTML = `<div class="empty">Niente da comprare 🎉 — tutte le misure richieste sono coperte.</div>`;
    return;
  }
  meta.textContent = `${rows.length} ${rows.length === 1 ? "misura" : "misure"} da acquistare`;
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>Misura</th>
        <th class="right">Necessarie</th>
        <th class="right">Possedute</th>
        <th class="right">Da comprare</th>
        <th>Per quali giochi</th>
      </tr></thead>
      <tbody>
        ${rows.map((r, i) => `
          <tr data-i="${i}">
            <td><strong>${r.size}</strong> mm</td>
            <td class="num right">${fmt(r.needed)}</td>
            <td class="num right">${fmt(r.owned)}</td>
            <td class="num right badge-tobuy">⚠️ ${fmt(r.to_buy)}</td>
            <td>
              <span class="games-trigger" onclick="this.parentElement.parentElement.classList.toggle('expanded')">
                ${(r.games || "").split(", ").length} giochi
              </span>
              <div class="games-list">${escapeHtml(r.games || "")}</div>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function renderInventory() {
  // Hide zero-count rows from the view: they're noise once you've burned
  // through a stash. The row stays in the DB so the audit log keeps its
  // history, but it doesn't pollute the table until count > 0 again.
  const rows = (STATE.data.inventory || []).filter(r => (r.count_owned || 0) > 0);
  const meta = document.getElementById("inv-meta");
  const wrap = document.getElementById("inv-wrap");
  meta.textContent = `${rows.length} ${rows.length === 1 ? "riga" : "righe"}`;
  if (!rows.length) {
    wrap.innerHTML = `<div class="empty">Nessuna busta in inventario.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>Misura</th>
        <th>Brand</th>
        <th class="right">Possedute</th>
        <th class="right">Modifica</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr class="inv-row" data-w="${r.width_mm}" data-h="${r.height_mm}" data-brand="${escapeHtml(r.brand || '')}">
            <td><strong>${r.size}</strong> mm</td>
            <td>${r.brand ? escapeHtml(r.brand) : '<span style="color:var(--muted)">—</span>'}</td>
            <td class="num right">
              <input type="number" class="qty-input" value="${r.count_owned}" data-original="${r.count_owned}" />
            </td>
            <td class="right">
              <span class="qty-controls">
                <button class="qty-btn warn" data-delta="-50">-50</button>
                <button class="qty-btn warn" data-delta="-10">-10</button>
                <button class="qty-btn" data-delta="10">+10</button>
                <button class="qty-btn" data-delta="50">+50</button>
                <button class="qty-btn" data-delta="100">+100</button>
                <button class="qty-save" disabled>Salva</button>
              </span>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
  wireInventoryRows();
}

function wireInventoryRows() {
  document.querySelectorAll(".inv-row").forEach(tr => {
    const input = tr.querySelector(".qty-input");
    const save = tr.querySelector(".qty-save");

    function refresh() {
      const orig = parseInt(input.dataset.original, 10);
      const cur = parseInt(input.value, 10);
      const dirty = !Number.isNaN(cur) && cur !== orig && cur >= 0;
      save.disabled = !dirty;
      input.classList.toggle("changed", dirty);
    }

    input.addEventListener("input", refresh);

    tr.querySelectorAll(".qty-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const delta = parseInt(btn.dataset.delta, 10);
        const cur = parseInt(input.value, 10) || 0;
        const next = Math.max(0, cur + delta);
        input.value = next;
        refresh();
      });
    });

    save.addEventListener("click", async () => {
      const orig = parseInt(input.dataset.original, 10);
      const cur = parseInt(input.value, 10);
      const delta = cur - orig;
      if (delta === 0) return;
      save.disabled = true;
      try {
        const r = await fetch("/sleeves/inventory/delta", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            width_mm: parseFloat(tr.dataset.w),
            height_mm: parseFloat(tr.dataset.h),
            delta,
            brand: tr.dataset.brand || null,
          }),
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${r.status}`);
        }
        showToast(`Salvato: ${delta > 0 ? "+" : ""}${delta} buste`);
        await load();
      } catch (e) {
        showToast(`Errore: ${e.message}`, true);
        save.disabled = false;
      }
    });
  });
}

// ---------- add-new form ----------
document.getElementById("add-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const w = parseFloat(document.getElementById("add-w").value);
  const h = parseFloat(document.getElementById("add-h").value);
  const c = parseInt(document.getElementById("add-c").value, 10);
  const b = document.getElementById("add-b").value.trim() || null;
  if (!(w > 0 && h > 0 && c >= 0)) {
    showToast("Compila tutti i campi numerici", true);
    return;
  }
  try {
    // Use upsert (absolute count) — more intuitive for a manual entry form
    // ("ho 100 buste di questa misura"), and works whether the row exists
    // or not. For partial increments use the inventory section above.
    const r = await fetch("/sleeves/inventory/upsert", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({width_mm: w, height_mm: h, count_owned: c, brand: b}),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${r.status}`);
    }
    showToast(`Aggiunto: ${c} buste ${w}×${h}${b ? ' · ' + b : ''}`);
    document.getElementById("add-form").reset();
    await load();
  } catch (e) {
    showToast(`Errore: ${e.message}`, true);
  }
});

// ---------- silent chat (top dock) ----------
// Conversation_id is preserved across reloads so multi-turn flows survive
// page refresh ("aggiungi 100 buste" → bot asks size → user reloads → bot
// still remembers the in-flight question). The bubble log was removed —
// only the latest assistant text is surfaced via the status line.
const CHAT_KEY = "boardy_sleeves_conv_id";
let CHAT = { convId: null };

function setChatConvId(id) {
  CHAT.convId = id;
  if (id) localStorage.setItem(CHAT_KEY, String(id));
  else    localStorage.removeItem(CHAT_KEY);
}

// Flatten LLM markdown into a single readable line for the 2-row status
// clamp. The assistant tends to reply with **bold** + bullet lists ("Fatto!
// **100 buste** - Prima: 0 - Ora: 100"); textContent would surface those
// tokens literally. We strip emphasis/code/links and turn list markers into
// inline separators so the sentence reads naturally on one line.
function stripMarkdown(s) {
  if (!s) return "";
  return String(s)
    .replace(/```[\s\S]*?```/g, "")            // fenced code blocks
    .replace(/`([^`]+)`/g, "$1")               // inline code
    .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")   // [text](url) → text
    .replace(/(\*\*|__)(.*?)\1/g, "$2")        // **bold** / __bold__
    .replace(/(\*|_)(.*?)\1/g, "$2")           // *italic* / _italic_
    .replace(/^\s{0,3}#{1,6}\s+/gm, "")        // headers
    .replace(/^\s*[-*+]\s+/gm, "· ")           // bullet markers → middot
    .replace(/\s*\n+\s*/g, " ")                // collapse newlines
    .replace(/\s{2,}/g, " ")
    .trim();
}

function setChatStatus(text, kind = "") {
  const el = document.getElementById("chat-status");
  el.textContent = stripMarkdown(text);
  el.className = `smart-status ${kind}`;
}

// Pull the most recent assistant text from a /chat history payload. The
// content may be an Anthropic-shape list of blocks or a plain string
// (DeepSeek/OpenAI shape) — we normalize both.
function lastAssistantText(history) {
  for (let i = history.length - 1; i >= 0; i--) {
    const t = history[i];
    if (t.role !== "assistant") continue;
    if (Array.isArray(t.content)) {
      const txt = t.content.filter(b => b.type === "text")
                           .map(b => b.text).join("\n").trim();
      if (txt) return txt;
    } else if (typeof t.content === "string" && t.content.trim()) {
      return t.content.trim();
    }
  }
  return "";
}

// Quick fingerprint of inventory + requirements counts. If the fingerprint
// changes after a chat turn, the bot performed a write → status goes green.
// Pure-Q&A turns don't change it → status stays neutral.
function dataFingerprint() {
  const d = (typeof STATE !== "undefined" && STATE.data) || {};
  const inv = (d.inventory || []).reduce((s, r) => s + (r.count || 0), 0);
  const req = (d.summary_all || []).length;
  const buy = (d.to_buy || []).length;
  return `${inv}|${req}|${buy}`;
}

async function loadChatConv() {
  const saved = localStorage.getItem(CHAT_KEY);
  if (!saved) return;
  try {
    const r = await fetch("/conversations/" + saved);
    if (!r.ok) { setChatConvId(null); return; }
    const c = await r.json();
    CHAT.convId = c.id;
    // No history rendering — but if the last turn was an assistant question
    // ("che dimensione?"), surface it so the user knows what was pending.
    const txt = lastAssistantText(c.history || []);
    if (txt) setChatStatus(txt, "");
  } catch (e) { setChatConvId(null); }
}

async function sendChat() {
  const ta = document.getElementById("chat-input");
  const msg = ta.value.trim();
  if (!msg) return;
  const send = document.getElementById("chat-send");
  send.disabled = true;
  setChatStatus("Sto pensando", "thinking");

  const fpBefore = dataFingerprint();

  try {
    const r = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: msg, conversation_id: CHAT.convId}),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    setChatConvId(data.conversation_id);

    // Reload data — chat may have updated inventory/requirements.
    // Must happen BEFORE we compute the fingerprint diff.
    await load();

    const reply = lastAssistantText(data.history) || "Fatto.";
    const changed = dataFingerprint() !== fpBefore;
    setChatStatus(reply, changed ? "success" : "");

    ta.value = "";
    ta.style.height = "auto";
  } catch (e) {
    setChatStatus(`⚠ Errore: ${e.message}`, "error");
  } finally {
    send.disabled = false;
    ta.focus();
  }
}

document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});
document.getElementById("chat-input").addEventListener("input", (e) => {
  e.target.style.height = "auto";
  e.target.style.height = Math.min(120, e.target.scrollHeight) + "px";
});
document.getElementById("chat-reset").addEventListener("click", () => {
  setChatConvId(null);
  setChatStatus("");
  showToast("Nuova chat avviata");
});

// ---------- init ----------
load();
loadChatConv();
</script>
</body>
</html>
